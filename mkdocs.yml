site_name: Clinical Tips
site_description: 個人用臨床クイックリファレンス

theme:
  name: material
  language: ja
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: ダークモードに切替
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: Roboto Mono
  features:
    - toc.integrate
    - toc.follow
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - toc:
      toc_depth: 2
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

nav:
  - めまい: dizziness.md
  - 胸痛: chest-pain.md
  - 低K血症: hypokalemia.md
  - 栄養管理: nutrition.md
  - 好中球減少性腸炎: neutropenic-enterocolitis.md
  - 肺炎球菌ワクチン: pneumococcal-vaccine.md
  - 精巣腫瘍・胚細胞腫瘍: germ-cell-tumor.md
  - CDI: cdi.md
  - 運用ルール: operations.md
